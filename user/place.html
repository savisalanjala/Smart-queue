<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>View Places</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #111827;
            --subtext: #6b7280;
            --primary: #6366f1;
        }

        .dark {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --subtext: #94a3b8;
            --primary: #818cf8;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
        }

        /* HEADER */
        .header {
            background: var(--primary);
            color: white;
            padding: 18px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
            font-weight: 500;
        }

        /* TOGGLE */
        .toggle {
            background: white;
            border: none;
            color: black;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
        }

        /* CONTAINER */
        .container {
            padding: 30px 40px;
        }

        /* BACK BUTTON */
        .back {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--primary);
            cursor: pointer;
            font-size: 14px;
        }

        /* GRID */
        .place-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }

        /* CARD */
        .place-card {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.06);
            transition: 0.25s;
        }

        .place-card:hover {
            transform: translateY(-6px);
        }

        .place-name {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
        }

        .place-info {
            margin-top: 6px;
            color: var(--subtext);
            font-size: 14px;
        }

        /* BUTTON */
        .btn {
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            border: none;
            background: var(--primary);
            color: white;
            font-size: 14px;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

<div class="header">
    <span>Available Places</span>
    <button class="toggle" onclick="toggleTheme()">🌙</button>
</div>

<div class="container">

    <div class="back" onclick="goBack()">⬅ Back to Dashboard</div>

    <div class="place-grid" id="placeGrid"></div>

</div>

<script>

/* LOAD THEME */
window.onload = () => {
    const theme = localStorage.getItem("theme");
    if (theme === "dark") {
        document.body.classList.add("dark");
    }

    loadPlaces();
};

/* TOGGLE DARK MODE */
function toggleTheme() {
    document.body.classList.toggle("dark");

    if (document.body.classList.contains("dark")) {
        localStorage.setItem("theme", "dark");
    } else {
        localStorage.setItem("theme", "light");
    }
}

/* LOAD PLACES */
function loadPlaces() {
    fetch("http://localhost:8080/user/places")
        .then(res => res.json())
        .then(data => {
            const grid = document.getElementById("placeGrid");

            if (data.length === 0) {
                grid.innerHTML = "<p>No places available</p>";
                return;
            }

            data.forEach(async place => {

    const card = document.createElement("div");
    card.className = "place-card";

    let queueLength = "Loading...";

    try {
        const res = await fetch(
            `http://localhost:8080/user/queue-length?placeId=${place.id}`
        );
        queueLength = await res.text();
    } catch {
        queueLength = "N/A";
    }

    card.innerHTML = `
        <div class="place-name">${place.name}</div>
        <div class="place-info">📍 ${place.location}</div>
        <div class="place-info">📞 ${place.contactNumber || "N/A"}</div>
        <div class="place-info">⏰ ${place.openingTime || "-"} - ${place.closingTime || "-"}</div>
        
        <div class="place-info">👥 Queue: ${queueLength} people</div>
    `;

    grid.appendChild(card);
});

let queueColor = "green";

if (queueLength > 10) queueColor = "red";
else if (queueLength > 5) queueColor = "orange";

`<div class="place-info" style="color:${queueColor}">
   👥 Queue: ${queueLength} people
</div>`
        })
        .catch(err => {
            alert("Failed to load places");
            console.error(err);
        });
}

/* BACK */
function goBack() {
    window.location.href = "userdashboard.html";
}

</script>

</body>
</html>
