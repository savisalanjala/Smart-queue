 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>

    <!-- Modern Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #111827;
            --subtext: #6b7280;
            --header: #1f2937;
        }

        .dark {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --subtext: #94a3b8;
            --header: #020617;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            transition: 0.3s;
        }

        /* HEADER */
        header {
            background: var(--header);
            color: white;
            padding: 18px 30px;
            font-size: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* DARK MODE BUTTON */
        .toggle {
            background: white;
            color: black;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        /* CONTAINER */
        .container {
            padding: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 25px;
        }

        /* CARD */
        .card {
            background: var(--card);
            height: 160px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.25s;
            text-align: center;
        }

        .card:hover {
            transform: translateY(-6px);
        }

        .card h3 {
            margin-bottom: 8px;
            color: var(--text);
        }

        .card p {
            color: var(--subtext);
            font-size: 13px;
        }

        /* COLOR STRIPS */
        .add { border-top: 4px solid #6366f1; }
        .queue { border-top: 4px solid #22c55e; }
        .call { border-top: 4px solid #ef4444; }
        .service { border-top: 4px solid #f59e0b; }

    </style>
</head>

<body>

<header>
    <span>Admin Dashboard – Smart Queue System</span>
    <button class="toggle" onclick="toggleTheme()">🌙</button>
</header>

<div class="container">

    <div class="card add" onclick="go('admin-place.html')">
        <h3>Add Place</h3>
        <p>Create a new queue location</p>
    </div>

    <div class="card service" onclick="go('admin-service.html')">
        <h3>Add Service</h3>
        <p>Add available services</p>
    </div>

    <div class="card queue" onclick="go('live-queue.html')">
        <h3>Live Queue</h3>
        <p>View current tokens</p>
    </div>

    <div class="card call" onclick="go('call-next-token.html')">
        <h3>Call Next Token</h3>
        <p>Serve or skip tokens</p>
    </div>

</div>

<script>
function go(page) {
    window.location.href = page;
}

/* DARK MODE */
function toggleTheme() {
    document.body.classList.toggle("dark");

    if (document.body.classList.contains("dark")) {
        localStorage.setItem("theme", "dark");
    } else {
        localStorage.setItem("theme", "light");
    }
}

/* LOAD SAVED THEME */
window.onload = () => {
    const theme = localStorage.getItem("theme");
    if (theme === "dark") {
        document.body.classList.add("dark");
    }
};
</script>

</body>
</html>
